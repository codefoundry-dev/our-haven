# Local-only dev dependencies for the Our Haven backend.
# Postgres mirrors Supabase Postgres in shape (vanilla Postgres + pgmq); production runs
# the same backend on Fly.io connecting to a hosted Supabase project (ADR-0010).
#
# Start:    docker compose -f apps/backend/docker-compose.yml up -d
# Stop:     docker compose -f apps/backend/docker-compose.yml down
# Reset:    docker compose -f apps/backend/docker-compose.yml down -v
#
# Note: for full-featured local Supabase (Auth + Storage + Realtime), run
# `supabase start` from the repo root using the Supabase CLI. This compose
# file is the lightweight path — just Postgres for backend dev/test.

services:
  postgres:
    image: postgres:16-alpine
    container_name: our-haven-postgres
    environment:
      POSTGRES_USER: our_haven
      POSTGRES_PASSWORD: our_haven
      POSTGRES_DB: our_haven_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U our_haven -d our_haven_dev']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
