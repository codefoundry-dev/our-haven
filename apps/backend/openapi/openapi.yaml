                additionalProperties: false
    post:
      summary: Register Our Haven for sales-tax collection in a US state — step-up MFA
        required.
      tags:
        - admin
        - tax
      description: Creates a Stripe Tax registration for the named US state
        (country=US, country_options[us][state]=...). Step-up-MFA-gated because
        registering for sales-tax collection is a binding compliance action.
        Used both for the pre-registration posture in priority states (per the
        OH-97 decision) and reactively when Stripe Tax surfaces a nexus
        threshold crossing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  type: string
                  minLength: 2
                  maxLength: 2
                  pattern: ^[A-Z]{2}$
                registrationType:
                  default: state_sales_tax
                  type: string
                  minLength: 1
                activeFromUnixSec:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
              required:
                - state
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  state:
                    anyOf:
                      - type: string
                      - type: "null"
                  registrationType:
                    anyOf:
                      - type: string
                      - type: "null"
                  status:
                    type: string
                  activeFrom:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
