  /v1/providers/me/home-childcare-registration:
    get:
      summary: Read the authenticated Caregiver's state home-childcare registration
        context
      tags:
        - providers
      description: "Returns the per-state home-childcare-licensing-agency context
        (agency name, programme name, register URL, admin hint) plus the current
        upload + admin-decision state. Eligibility: role=caregiver AND
        categories includes babysitter or nanny — Tutor-only Caregivers get 409;
        Providers (clinical) are rejected by the role guard (403). When the
        resident state is outside the launch slate,
        `homeChildcareBoardSupported` is false and `board` is null; the upload
        affordance should be hidden client-side."
