  /v1/providers/me/stripe-connect/summary:
    get:
      summary: Read the authenticated Provider's Stripe Connect Express account summary
      tags:
        - providers
      description: Returns the read-only Connect account state mirrored from
        `account.updated` webhooks. Includes charges_enabled / payouts_enabled /
        details_submitted, the disabled_reason if Stripe has paused the account,
        and the requirement lists (currently_due, past_due,
        pending_verification) so the UI can surface what the Provider still
        needs to fix on Stripe's side. `accountReady` is true iff both
        capabilities are enabled — this is the OH-110 gate for verification
        activation + appearing in search.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasAccount:
                    type: boolean
                  stripeAccountId:
                    anyOf:
                      - type: string
                      - type: "null"
                  chargesEnabled:
                    type: boolean
                  payoutsEnabled:
                    type: boolean
                  detailsSubmitted:
                    type: boolean
                  disabledReason:
                    anyOf:
                      - type: string
                      - type: "null"
                  accountReady:
                    type: boolean
                  accountReadyAt:
                    anyOf:
                      - type: string
                        format: date-time
                        pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      - type: "null"
                  requirementsCurrentlyDue:
                    type: array
                    items:
                      type: string
                  requirementsPastDue:
                    type: array
                    items:
                      type: string
                  requirementsPendingVerification:
                    type: array
                    items:
                      type: string
                  lastWebhookAt:
                    anyOf:
                      - type: string
                        format: date-time
                        pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      - type: "null"
                required:
                  - hasAccount
                  - stripeAccountId
                  - chargesEnabled
                  - payoutsEnabled
                  - detailsSubmitted
                  - disabledReason
                  - accountReady
                  - accountReadyAt
                  - requirementsCurrentlyDue
                  - requirementsPastDue
                  - requirementsPendingVerification
                  - lastWebhookAt
                additionalProperties: false
