      summary: List Stripe Tax registrations (the nexus dashboard view).
      tags:
        - admin
        - tax
      description: Mirrors Stripe Tax `GET /v1/tax/registrations`. Status defaults to
        `active`; pass `all` to include scheduled + expired. This is the source
        of truth admins use to see which states Our Haven is collecting in.
      parameters:
        - schema:
            default: active
            type: string
            enum:
              - active
              - expired
              - scheduled
              - all
          in: query
          name: status
          required: false
        - schema:
            default: 100
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: limit
          required: false
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        state:
                          anyOf:
                            - type: string
                            - type: "null"
                        registrationType:
                          anyOf:
                            - type: string
                            - type: "null"
                        status:
                          type: string
                        activeFrom:
                          type: string
                          format: date-time
                          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        expiresAt:
