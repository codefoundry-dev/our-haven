openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — Parent + Provider mobile, Provider web portal,
    admin dashboard. Source of truth per ADR-0004. US-region only.
  license:
    name: Proprietary
components:
  securitySchemes:
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase Auth ID token. Verified by firebase-admin on every request.
  schemas: {}
paths:
  /v1/healthz:
    get:
      summary: Liveness probe
      tags:
        - health
      description: Returns 200 as long as the process is up.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  service:
                    type: string
                  version:
                    type: string
                required:
                  - status
                  - service
                  - version
                additionalProperties: false
  /v1/readyz:
    get:
      summary: Readiness probe
      tags:
        - health
      description: Checks Postgres + Firestore reachability. Returns 503 with
        status=degraded if any dependency is unreachable.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                      - degraded
                  checks:
                    type: object
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - fail
                      firestore:
                        type: string
                        enum:
                          - ok
                          - fail
                    required:
                      - postgres
                      - firestore
                    additionalProperties: false
                required:
                  - status
                  - checks
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                      - degraded
                  checks:
                    type: object
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - fail
                      firestore:
                        type: string
                        enum:
                          - ok
                          - fail
                    required:
                      - postgres
                      - firestore
                    additionalProperties: false
                required:
                  - status
                  - checks
                additionalProperties: false
  /v1/auth/role-claim:
    post:
      summary: Set the permanent role + kind on the authenticated Firebase user
      tags:
        - auth
      description: Idempotent. Rejects with 409 if the user already has a role claim
        that differs from the request. Once set, role is permanent per
        CONTEXT.md § Authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - parent
                    - provider
                kind:
                  type: string
                  enum:
                    - caregiver
                    - specialist
                caregiverCategory:
                  type: string
                  minLength: 1
                  maxLength: 64
                specialty:
                  type: string
                  minLength: 1
                  maxLength: 64
              required:
                - role
      security:
        - firebaseIdToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    enum:
                      - parent
                      - provider
                  kind:
                    anyOf:
                      - type: string
                        enum:
                          - caregiver
                          - specialist
                      - type: "null"
                required:
                  - role
                  - kind
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/email-otp/issue:
    post:
      summary: Issue an email-OTP for the authenticated user
      tags:
        - auth
      description: Email-OTP fallback path per CONTEXT.md § MFA posture — used for
        pre-paywall Parents without a phone on file. The notifier is a dev stub
        today; SendGrid wiring lands in OH-115 (Notifications dispatcher).
      security:
        - firebaseIdToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - id
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/email-otp/verify:
    post:
      summary: Verify an email-OTP and open a step-up window
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      security:
        - firebaseIdToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondFactor:
                    type: string
                    enum:
                      - totp
                      - phone
                  grantedAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - secondFactor
                  - grantedAt
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/step-up/refresh:
    post:
      summary: Record a fresh MFA challenge from a Firebase MFA-extended ID token
      tags:
        - auth
      description: Called by clients after completing Firebase TOTP or phone MFA.
        Reads sign_in_second_factor from the verified token and opens a step-up
        window. Rejects when the ID token was not minted from an MFA-extended
        sign-in.
      security:
        - firebaseIdToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondFactor:
                    type: string
                    enum:
                      - totp
                      - phone
                  grantedAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - secondFactor
                  - grantedAt
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/uploads/signed-url:
    post:
      summary: Create a v4 signed PUT URL for client-side GCS upload
      tags:
        - uploads
      description: Returns a short-lived (5 min default) v4 signed URL the client uses
        to PUT a file directly to GCS. Content-type and max size are enforced
        via x-goog-content-length-range on the signed request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                    - id-doc
                    - license-doc
                    - insurance-doc
                    - state-childcare-registration
                    - avatar
                contentType:
                  type: string
                  enum:
                    - image/jpeg
                    - image/png
                    - application/pdf
                contentLengthBytes:
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 20971520
              required:
                - kind
                - contentType
                - contentLengthBytes
      security:
        - firebaseIdToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                    format: uri
                  objectPath:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - uploadUrl
                  - objectPath
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  field:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  field:
                    type: string
                required:
                  - error
                additionalProperties: false
servers:
  - url: https://api.ourhaven.example
    description: Production (us-east1)
  - url: http://localhost:8080
    description: Local development
tags:
  - name: health
    description: Liveness and readiness probes
  - name: uploads
    description: Signed-URL helper for client-side GCS uploads
  - name: auth
    description: Role claims, email-OTP fallback, step-up MFA grants
