openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — Parent + Provider mobile, Provider web portal,
    admin dashboard. Source of truth per ADR-0004 (§§ 1–3, 8) and ADR-0010
    (Supabase + Fly.io + Vercel platform). US-region only.
  license:
    name: Proprietary
components:
  securitySchemes:
    supabaseAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token (HS256). Verified locally with the
        project JWT secret on every request.
  schemas: {}
paths:
  /v1/healthz:
    get:
      summary: Liveness probe
      tags:
        - health
      description: Returns 200 as long as the process is up.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  service:
                    type: string
                  version:
                    type: string
                required:
                  - status
                  - service
                  - version
                additionalProperties: false
  /v1/readyz:
    get:
      summary: Readiness probe
      tags:
        - health
      description: Checks Postgres reachability. Returns 503 with status=degraded if
        Postgres is unreachable. (Supabase Auth + Storage + Realtime share the
        same Postgres backend, so this single check covers the data plane per
        ADR-0010.)
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                      - degraded
                  checks:
                    type: object
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - fail
                    required:
                      - postgres
                    additionalProperties: false
                required:
                  - status
                  - checks
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                      - degraded
                  checks:
                    type: object
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - fail
                    required:
                      - postgres
                    additionalProperties: false
                required:
                  - status
                  - checks
                additionalProperties: false
  /v1/auth/role-claim:
    post:
      summary: Set the permanent role on the authenticated Supabase user
      tags:
        - auth
      description: Idempotent. Rejects with 409 if the user already has a role claim
        that differs from the request. Once set, role is permanent per
        CONTEXT.md § Authentication. Claims are written to Supabase
        `app_metadata`; the client must refresh its session to receive an access
        token carrying the new claims.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - parent
                    - caregiver
                    - provider
                categories:
                  minItems: 1
                  type: array
                  items:
                    type: string
                    enum:
                      - babysitter
                      - tutor
                      - nanny
                specialty:
                  type: string
                  enum:
                    - slp
                    - ot
                    - aba
                    - psychology
                    - other
              required:
                - role
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    enum:
                      - parent
                      - caregiver
                      - provider
                  categories:
                    anyOf:
                      - type: array
                        items:
                          type: string
                          enum:
                            - babysitter
                            - tutor
                            - nanny
                      - type: "null"
                  specialty:
                    anyOf:
                      - type: string
                        enum:
                          - slp
                          - ot
                          - aba
                          - psychology
                          - other
                      - type: "null"
                required:
                  - role
                  - categories
                  - specialty
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/email-otp/issue:
    post:
      summary: Issue an email-OTP for the authenticated user
      tags:
        - auth
      description: Email-OTP fallback path per CONTEXT.md § MFA posture — used for
        pre-paywall Parents without a phone on file. The notifier is a dev stub
        today; SendGrid wiring lands in OH-115 (Notifications dispatcher).
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - id
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/email-otp/verify:
    post:
      summary: Verify an email-OTP and open a step-up window
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondFactor:
                    type: string
                    enum:
                      - totp
                      - phone
                  grantedAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - secondFactor
                  - grantedAt
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/auth/step-up/refresh:
    post:
      summary: Record a fresh MFA challenge from a Supabase aal2 access token
      tags:
        - auth
      description: Called by clients after completing a Supabase MFA challenge (TOTP
        enrollment / phone factor). Reads the token's `aal` and `amr` claims and
        opens a step-up window. Rejects when the access token is not `aal2`.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondFactor:
                    type: string
                    enum:
                      - totp
                      - phone
                  grantedAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - secondFactor
                  - grantedAt
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/uploads/signed-url:
    post:
      summary: Create a short-lived signed PUT URL for client-side Supabase Storage
        upload
      tags:
        - uploads
      description: Returns a short-lived (5 min default) Supabase Storage signed
        upload URL + token. The client uses `uploadToSignedUrl` (or a fetch PUT
        with the token) to send the file directly to Supabase Storage.
        Content-type and per-kind max size are validated on the request;
        bucket-level size caps in Supabase Storage backstop the limit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                    - id-doc
                    - license-doc
                    - insurance-doc
                    - state-childcare-registration
                    - avatar
                contentType:
                  type: string
                  enum:
                    - image/jpeg
                    - image/png
                    - application/pdf
                contentLengthBytes:
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 20971520
              required:
                - kind
                - contentType
                - contentLengthBytes
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                    format: uri
                  uploadToken:
                    type: string
                  objectPath:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - uploadUrl
                  - uploadToken
                  - objectPath
                  - expiresAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  field:
                    type: string
                required:
                  - error
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  field:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/providers:
    post:
      summary: Supply sign-up — persist the supply row + set role/state claims
      tags:
        - providers
      description: "Creates a supply row keyed by Supabase user id and writes custom
        claims to Supabase `app_metadata` (role ∈ {caregiver, provider}, state,
        categories | specialty per ADR-0011). Idempotent: re-posting identical
        attributes returns 200 with the existing row; a mismatched role /
        categories / specialty / state returns 409 (role + sub-type + state are
        permanent per CONTEXT.md § Authentication). A user already bound to
        role=parent or role=admin cannot sign up as supply — they must create a
        second account."
