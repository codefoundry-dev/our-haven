  /v1/webhooks/stripe:
    post:
      summary: Stripe webhook — completes the OH-106 screening charge
      tags:
        - webhooks
      description: Receives Stripe webhook deliveries. Verifies the `Stripe-Signature`
        header (HMAC-SHA256 of `t.payload` with the webhook signing secret),
        then handles `payment_intent.succeeded` events whose metadata.purpose is
        `screening` by creating the Checkr invitation and stamping
        `screening_initiated_at`. Other event types acknowledge with 200.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    enum:
                      - true
                required:
                  - received
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/webhooks/stripe-connect:
    post:
      summary: Stripe Connect Express webhook — mirrors account.updated onto
        provider_connect_accounts
      tags:
        - webhooks
      description: Receives Stripe Connect webhook deliveries (separate endpoint +
        signing secret from the screening webhook). Verifies the
        `Stripe-Signature` header using `STRIPE_CONNECT_WEBHOOK_SECRET`, then on
        `account.updated` mirrors charges_enabled / payouts_enabled /
        details_submitted / requirements / disabled_reason onto the row keyed by
        `stripe_account_id`. When both capabilities transition to enabled for
        the first time, stamps `account_ready_at` — that timestamp is the OH-110
        gate on verification activation and search visibility.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    enum:
                      - true
                required:
                  - received
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
  /v1/webhooks/checkr:
    post:
      summary: Checkr (background-check vendor) webhook — drives the Verification
        state machine
      tags:
        - webhooks
      description: Receives Checkr `report.*` deliveries. Verifies the
        `X-Checkr-Signature` HMAC against the webhook secret, normalizes the
        payload via the vendor-agnostic adapter, folds the result into the
        verification facts (screening_passed_at / rejected_at), and stamps the
        raw payload onto `provider_screenings.raw_payload` for FCRA-windowed
        retention. A second vendor (Sterling, GoodHire) would land on a sibling
        route using the same adapter contract.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    enum:
                      - true
                required:
                  - received
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  reason:
                    type: string
                required:
                  - error
                additionalProperties: false
servers:
  - url: https://api.ourhaven.example
    description: Production (Fly.io iad)
  - url: http://localhost:8080
    description: Local development
tags:
  - name: health
    description: Liveness and readiness probes
  - name: uploads
    description: Signed-URL helper for client-side Supabase Storage uploads
  - name: auth
    description: Role claims, email-OTP fallback, step-up MFA grants
  - name: providers
    description: Provider sign-up + profile (web portal + mobile companion)
  - name: screening
    description: Provider background-screening (OH-106) — $35 Stripe charge + Checkr
      standard package via vendor-agnostic adapter
  - name: webhooks
    description: Inbound vendor webhooks (Stripe, Checkr)
  - name: admin
    description: Admin-only surfaces (dashboards, tax registrations, etc.)
  - name: tax
    description: Stripe Tax (OH-111) — per-state taxability on Subscription +
      Commission; bookings deliberately not taxed.
