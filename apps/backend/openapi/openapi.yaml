  /v1/providers/me/profile:
    get:
      summary: Read the authenticated supply account's public-profile editor state
      tags:
        - providers
      description: Returns the profile fields edited on the supply onboarding surface
        — published rate, optional per-child surcharge (Babysitter/Nanny only),
        availability summary grid + note + paused flag, W-10 self-attestation
        toggle, bio, languages, specialty tags, photo. Creates an empty row on
        first read so the editor always has a target.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  providerId:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  role:
                    type: string
                    enum:
                      - caregiver
                      - provider
                  categories:
                    anyOf:
                      - type: array
                        items:
                          type: string
                          enum:
                            - babysitter
                            - tutor
                            - nanny
                      - type: "null"
                  specialty:
                    anyOf:
                      - type: string
                        enum:
                          - slp
                          - ot
                          - aba
                          - psychology
                          - other
                      - type: "null"
                  displayName:
                    anyOf:
                      - type: string
                      - type: "null"
                  headline:
                    anyOf:
                      - type: string
                      - type: "null"
                  bio:
                    anyOf:
                      - type: string
                      - type: "null"
                  languages:
