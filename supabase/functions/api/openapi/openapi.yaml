openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — single Hono fat Edge Function (ADR-0019). Source
    of truth per ADR-0004 (§§ 1–3, 8). US-region only.
  license:
    name: Proprietary
servers:
  - url: https://<project-ref>.supabase.co/functions/v1/api
    description: Supabase Edge Function (production) — replace <project-ref>.
  - url: http://localhost:54321/functions/v1/api
    description: Local (supabase functions serve)
tags:
  - name: health
    description: Liveness and readiness probes
  - name: auth
    description: Authentication — role-claim, email-OTP, step-up MFA
  - name: caregiver
    description: Caregiver Stripe Connect Express — onboarding, summary, dashboard (OH-190)
  - name: badges
    description: Optional Caregiver badges (OH-187) — W-10 "Tax-credit-friendly"
      self-attest + per-state home-childcare (FCCH) registration; neither gates
      activation.
  - name: profile
    description: "Supply profile builders — Caregiver (OH-188): per-category Rate +
      surcharge, availability, negotiable toggle, ages-served +
      behaviour-comfort, and the Credentials umbrella (admin-reviewed). Provider
      (OH-189): specialty + per-session display Rate, consultation-slot
      publishing, and the read-only license/insurance/screening
      credential-status badge."
  - name: subscription
    description: Subscriptions (Stripe Billing, both web-sold to dodge IAP).
      Provider Subscription (OH-191) — checkout + portal (Provider as Customer,
      not Connect); listing gated on an active subscription; plus the public
      corporate "Contact Us" intake (sales-led custom contract; v1 intake only).
      Parent Subscription (OH-193) — checkout (with Stripe Promotion Codes) +
      portal; an active subscription unlocks the demand-side marketplace (the M3
      paywall reads the access state).
  - name: search
    description: "Unified Search (OH-201) — one Parent-facing surface across
      Caregivers + clinical Providers: filters (category/specialty, ZIP+radius,
      date/time ∩ Availability, Rate ceiling, min Rating, Tax-credit-friendly,
      ages-served, behaviour-comfort), the OH-180 hybrid ranking, and the
      blur-to-unblur preview wall (1–2 full per category for non-entitled
      Parents; unblurs on Subscription)."
  - name: bookings
    description: Provider consultation booking (OH-203) — a Parent books an open
      consultation slot (slot-pick); the per-session Booking is born `accepted`
      with NULL payment (off-platform; no Job/Offer/payment-intent), holds the
      slot, shows on both schedules, and auto-completes after the slot.
      Parent-Subscription-gated.
  - name: messaging
    description: In-app Messaging (OH-205) — pre-acceptance Parent↔Caregiver
      Direct-Message threads (Caregiver-only, ADR-0011), Supabase Realtime
      delivery, and disintermediation redaction at write time (the unredacted
      original is queued to the service-role-only Trust & Safety flag table).
      Opening a thread + a Parent send are Parent-Subscription-gated.
  - name: jobs
    description: Posted Jobs (OH-209) — a Parent composes + publishes a Job open to
      verified in-category Caregivers (Category + ZIP + scope + concrete
      schedule + child count/ages + disclosed Safety-Behaviors subset + service
      address + optional budget hint). Publishing is Parent-Subscription-gated
      (402); the disclosure consent is timestamped (ADR-0016). A multi-day
      one-off fans out into one Job per date; a recurring rule posts a single
      Job (ADR-0014).
  - name: verification
    description: Supply verification — state + email/phone/ID-doc facts (OH-184)
  - name: screening
    description: Background screening — $35 Stripe charge + Checkr standard package (OH-185)
  - name: uploads
    description: Signed URLs for client-direct private Storage uploads (OH-184)
  - name: webhooks
    description: Vendor webhooks — Stripe Connect account.updated (OH-190), Stripe
      payments payment_intent.succeeded + Checkr report.* (OH-185), Stripe
      Billing checkout.session.completed + customer.subscription.* for both
      Provider (OH-191) and Parent (OH-193) subscriptions
  - name: admin
    description: Admin-only surfaces (Stripe Tax registrations + calculation audit, etc.)
  - name: tax
    description: Stripe Tax (OH-192) — per-state taxability on Subscription +
      Commission; Bookings deliberately not taxed.
