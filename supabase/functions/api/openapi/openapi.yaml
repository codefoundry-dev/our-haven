        locked to the published per-category Rate (ADR-0017). The free-text
        scope_note is redacted at write time. 400 on an invalid schedule
        (recurring not yet composable), child-detail, or a category the
        Caregiver doesn't offer. 404 if the thread isn't the caller's.
