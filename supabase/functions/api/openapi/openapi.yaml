    get:
      tags:
        - caregiver
      summary: Read the authenticated Caregiver's Stripe Connect Express account summary
      description: "Returns the read-only Connect account state mirrored from
        `account.updated` webhooks: charges_enabled / payouts_enabled /
        details_submitted, the disabled_reason if Stripe paused the account, and
        the requirement lists (currently_due, past_due, pending_verification).
