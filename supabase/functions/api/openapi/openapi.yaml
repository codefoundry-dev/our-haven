          description: The created Offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
        "400":
          description: Invalid Offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "402":
          description: No active Parent Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "404":
          description: Thread not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
    get:
