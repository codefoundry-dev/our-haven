      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "403":
