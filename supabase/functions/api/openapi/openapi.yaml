          required: false
          description: When "true", only W-10 Tax-credit-friendly Caregivers
            (Babysitter/Nanny).
          name: taxCreditFriendly
          in: query
        - schema:
            type: string
            description: CSV of age bands (infant,toddler,preschool,school-age,teen).
