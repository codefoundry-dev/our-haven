        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingError"
        "404":
          description: Booking not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingError"
        "409":
          description: Not reportable (wrong state or before the scheduled start)
          content:
