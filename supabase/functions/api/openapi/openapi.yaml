            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "402":
          description: No active Parent Subscription — messaging gated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "403":
          description: Wrong role (caregiver / provider / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "404":
