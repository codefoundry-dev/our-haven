  /v1/providers/me/consultation-slots:
    get:
      tags:
        - profile
      summary: List the authenticated Provider's published consultation slots
      description: Returns the Provider's active consultation slots (open + held;
        withdrawn/released ones are omitted), each with its bookable flag. Open
        slots are what the M2.7 scheduler surfaces to Parents.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: The published slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationSlotList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
    post:
      tags:
        - profile
      summary: Publish a bookable consultation slot
      description: Lists a new consultation window (born `open`, immediately
        bookable). The date must be YYYY-MM-DD and the window 0 ≤ startMin <
        endMin ≤ 1440. Requires an active Provider Subscription (OH-191) —
        publishing a bookable slot is what "enables consultation Bookings", so a
        Provider who is not listed is rejected with 402. Rejected with 409 if it
        overlaps an existing active slot on the same day (a Provider cannot
        double-book a window).
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationSlotCreateRequest"
      responses:
        "201":
          description: Slot published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationSlot"
        "400":
          description: Invalid date / window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "402":
          description: No active Provider Subscription — listing gated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "409":
          description: Overlaps an existing slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
  /v1/providers/me/consultation-slots/{slotId}:
    delete:
      tags:
        - profile
      summary: Withdraw an open consultation slot
      description: Un-publishes an open slot (open → released). A held slot (a Parent
        has booked it) cannot be withdrawn — cancel the consultation Booking
        first, which releases it (409).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: slotId
          in: path
      responses:
        "200":
          description: Slot withdrawn
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawn:
                    type: boolean
                    enum:
                      - true
                required:
                  - withdrawn
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "404":
          description: Slot not found (or not owned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "409":
          description: Slot is held — cancel the booking first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
  /v1/providers/me/subscription:
    get:
      tags:
        - subscription
      summary: Read the authenticated Provider's subscription + listing state
      description: "Returns the Provider Subscription state mirrored from Stripe
        billing webhooks: the lifecycle `status`, whether the Provider is
        currently `listed` (search-visible + bookable — true iff status is
        active/trialing), the cancel-at-period-end flag and current period end,
        and the price id. Caregivers are rejected by the provider-only role
        guard (403)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "403":
          description: Wrong role (caregiver / parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
  /v1/providers/me/subscription/checkout-link:
    post:
      tags:
        - subscription
      summary: Create / reuse a Stripe Customer and return a hosted subscription
        Checkout URL
      description: "Idempotent on the Customer: if the Provider already has a
        `provider_subscriptions` row with a `stripe_customer_id`, reuses it;
        otherwise creates a Stripe Customer (Provider as Customer — NOT Connect)
        and stamps it onto the row before returning. Returns a Stripe-hosted
        Checkout Session URL in subscription mode
        (STRIPE_PROVIDER_SUBSCRIPTION_PRICE_ID). On completion Stripe redirects
        to STRIPE_SUBSCRIPTION_SUCCESS_URL and the billing webhook activates the
        listing."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Checkout link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionCheckoutLink"
        "400":
          description: No email on file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
  /v1/providers/me/subscription/portal-link:
    post:
      tags:
        - subscription
      summary: Issue a Stripe Billing Portal login link — manage / cancel the
        subscription
      description: Returns a one-time Stripe Billing Portal URL where the Provider can
        update their payment method or cancel the Provider Subscription. A
        cancellation flows back through the billing webhook, which clears the
        listing once the subscription ends. Requires an existing Stripe Customer
        (start checkout first).
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Billing Portal link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionPortalLink"
        "400":
          description: No Stripe Customer (start checkout first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
  /v1/parents/me/subscription:
    get:
      tags:
        - subscription
      summary: Read the authenticated Parent's subscription + access state
      description: "Returns the Parent Subscription state mirrored from Stripe billing
        webhooks: the lifecycle `status`, whether the Parent is currently
        `entitled` (the marketplace is unlocked — true iff status is
        active/trialing; this is the state the M3 paywall reads), the
        cancel-at-period-end flag and current period end, and the price id.
        Supply roles are rejected by the parent-only role guard (403)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "403":
          description: Wrong role (caregiver / provider / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
  /v1/parents/me/subscription/checkout-link:
    post:
      tags:
        - subscription
      summary: Create / reuse a Stripe Customer and return a hosted subscription
        Checkout URL
      description: 'Idempotent on the Customer: if the Parent already has a
        `parent_subscriptions` row with a `stripe_customer_id`, reuses it;
        otherwise creates a Stripe Customer and stamps it onto the row before
        returning. Returns a Stripe-hosted Checkout Session URL in subscription
