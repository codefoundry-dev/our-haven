          description: Empty message body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "402":
          description: No active Parent Subscription — messaging gated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "404":
          description: Thread not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
  /v1/threads/{threadId}/offers:
    post:
      tags:
        - offers
      summary: Compose + send a structured Offer / Book-request — OH-206
      description: Sends a structured Offer into a thread the caller participates in.
        A Parent send is Parent-Subscription-gated (402). The Safety-Behaviors
