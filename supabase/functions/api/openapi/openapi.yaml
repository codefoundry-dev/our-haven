      description: Returns a one-time Stripe Billing Portal URL where the Parent can
        update their payment method or cancel the Parent Subscription. A
        cancellation flows back through the billing webhook, which walls access
        once the subscription ends. Requires an existing Stripe Customer (start
        checkout first).
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Billing Portal link issued
          content:
            application/json:
