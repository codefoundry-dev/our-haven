  /v1/offers/{offerId}:
    patch:
      tags:
        - offers
      summary: Edit a still-pending Offer / Book-request — OH-208
      description: The sender revises their own still-pending Offer in place (schedule
        / rate / child-detail / disclosure / address / note). The rate +
        per-child surcharge are re-snapshotted from the Caregiver's current
        profile, the total is recomputed, the scope_note is re-redacted (its T&S
        flag refreshed), and the 72h validity is re-armed — the Offer stays
        pending. A Parent edit is Parent-Subscription-gated (402). 409 if the
        caller isn't the sender or the Offer is no longer pending. 400 on
        invalid child-detail / schedule / an unavailable category.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: offerId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComposeOfferRequest"
      responses:
        "200":
          description: The updated Offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
        "400":
          description: Invalid transition input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "402":
