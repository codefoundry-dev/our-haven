openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — single Hono fat Edge Function (ADR-0019). Source
    of truth per ADR-0004 (§§ 1–3, 8). US-region only.
  license:
    name: Proprietary
servers:
  - url: https://<project-ref>.supabase.co/functions/v1/api
    description: Supabase Edge Function (production) — replace <project-ref>.
  - url: http://localhost:54321/functions/v1/api
    description: Local (supabase functions serve)
tags:
  - name: health
    description: Liveness and readiness probes
  - name: auth
    description: Authentication — role-claim, email-OTP, step-up MFA
  - name: caregiver
    description: Caregiver Stripe Connect Express — onboarding, summary, dashboard (OH-190)
  - name: verification
    description: Supply verification — state + email/phone/ID-doc facts (OH-184)
  - name: screening
    description: Background screening — $35 Stripe charge + Checkr standard package (OH-185)
  - name: uploads
    description: Signed URLs for client-direct private Storage uploads (OH-184)
  - name: webhooks
    description: Vendor webhooks — Stripe Connect account.updated (OH-190), Stripe
      payments payment_intent.succeeded + Checkr report.* (OH-185)
  - name: admin
    description: Admin-only surfaces (Stripe Tax registrations + calculation audit, etc.)
  - name: tax
    description: Stripe Tax (OH-192) — per-state taxability on Subscription +
      Commission; Bookings deliberately not taxed.
components:
  securitySchemes:
    supabaseAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token (HS256). Verified locally with the
        project JWT secret on every request.
  schemas:
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
        version:
          type: string
      required:
        - status
        - service
        - version
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
            - degraded
        checks:
          type: object
          properties:
            postgres:
              type: string
              enum:
                - ok
                - fail
          required:
            - postgres
      required:
        - status
        - checks
    RoleClaimResponse:
      type: object
      properties:
        role:
          type: string
          enum:
            - parent
            - caregiver
            - provider
        categories:
          type: array
          nullable: true
          items:
            type: string
            enum:
              - babysitter
              - tutor
              - nanny
        specialty:
          type: string
          nullable: true
          enum:
            - slp
            - ot
            - aba
            - psychology
            - other
            - null
        state:
          type: string
          nullable: true
          enum:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - DC
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
            - null
      required:
        - role
        - categories
        - specialty
        - state
    AuthErrorResponse:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    EmailOtpIssueResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
      required:
        - id
        - expiresAt
    StepUpRefreshResponse:
      type: object
      properties:
        secondFactor:
          type: string
          enum:
            - totp
            - phone
        grantedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      required:
        - secondFactor
        - grantedAt
        - expiresAt
    CaregiverConnectSummary:
      type: object
      properties:
        hasAccount:
          type: boolean
        stripeAccountId:
          type: string
          nullable: true
        chargesEnabled:
          type: boolean
        payoutsEnabled:
          type: boolean
        detailsSubmitted:
          type: boolean
        disabledReason:
          type: string
          nullable: true
        accountReady:
          type: boolean
        accountReadyAt:
          type: string
          nullable: true
          format: date-time
        requirementsCurrentlyDue:
          type: array
          items:
            type: string
        requirementsPastDue:
          type: array
          items:
            type: string
        requirementsPendingVerification:
          type: array
          items:
            type: string
        lastWebhookAt:
          type: string
          nullable: true
          format: date-time
      required:
        - hasAccount
        - stripeAccountId
        - chargesEnabled
        - payoutsEnabled
        - detailsSubmitted
        - disabledReason
        - accountReady
        - accountReadyAt
        - requirementsCurrentlyDue
        - requirementsPastDue
        - requirementsPendingVerification
        - lastWebhookAt
    CaregiverConnectError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    CaregiverConnectOnboardingLink:
      type: object
      properties:
        stripeAccountId:
          type: string
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
      required:
        - stripeAccountId
        - url
        - expiresAt
    CaregiverConnectDashboardLink:
      type: object
      properties:
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
      required:
        - url
        - createdAt
    SupplyVerification:
      type: object
      properties:
        state:
          type: string
          enum:
            - unverified
            - email-verified
            - id-uploaded
            - screening-initiated
            - connect-pending
            - license-pending
            - insurance-pending
            - holding-state-not-supported
            - awaiting-phone-verification
            - activated
            - rejected
        role:
          type: string
          enum:
            - caregiver
            - provider
        residentState:
          type: string
          enum:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - DC
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
        licenseBoardSupported:
          type: boolean
        facts:
          $ref: "#/components/schemas/SupplyVerificationFacts"
      required:
        - state
        - role
        - residentState
        - licenseBoardSupported
        - facts
    SupplyVerificationFacts:
      type: object
      properties:
        emailConfirmedAt:
          type: string
          nullable: true
          format: date-time
        phoneConfirmedAt:
          type: string
          nullable: true
          format: date-time
        idDocUploadedAt:
          type: string
          nullable: true
          format: date-time
        idDocObjectPath:
          type: string
          nullable: true
        screeningInitiatedAt:
          type: string
          nullable: true
          format: date-time
        screeningPassedAt:
          type: string
          nullable: true
          format: date-time
        licenseVerifiedAt:
          type: string
          nullable: true
          format: date-time
        connectAccountReadyAt:
          type: string
          nullable: true
          format: date-time
        rejectedAt:
          type: string
          nullable: true
          format: date-time
        rejectionReason:
          type: string
          nullable: true
      required:
        - emailConfirmedAt
        - phoneConfirmedAt
        - idDocUploadedAt
        - idDocObjectPath
        - screeningInitiatedAt
        - screeningPassedAt
        - licenseVerifiedAt
        - connectAccountReadyAt
        - rejectedAt
        - rejectionReason
    VerificationError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    IdDocConfirmRequest:
      type: object
      properties:
        objectPath:
          type: string
          minLength: 1
          maxLength: 512
      required:
        - objectPath
    ScreeningInitiateResponse:
      type: object
      properties:
        screeningId:
          type: string
          format: uuid
        clientSecret:
          type: string
        paymentIntentId:
          type: string
        amountCents:
          type: integer
          minimum: 0
          exclusiveMinimum: true
      required:
        - screeningId
        - clientSecret
        - paymentIntentId
        - amountCents
    ScreeningError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    SignedUploadUrl:
      type: object
      properties:
        bucket:
          type: string
        objectPath:
          type: string
        token:
          type: string
        signedUrl:
          type: string
      required:
        - bucket
        - objectPath
        - token
        - signedUrl
    UploadsError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    SignedUploadUrlRequest:
      type: object
      properties:
        kind:
          type: string
          enum:
            - id-doc
      required:
        - kind
    StripeConnectWebhookAck:
      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    StripeConnectWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    StripePaymentsWebhookAck:
      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    StripePaymentsWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    CheckrWebhookAck:
      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    CheckrWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    AdminStripeTaxCalculation:
      type: object
      properties:
        calculationId:
          type: string
        stripeCalculationId:
          type: string
        purpose:
          type: string
          enum:
            - subscription
            - commission
        customerState:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        customerPostalCode:
          type: string
          nullable: true
        amountCents:
          type: integer
        taxAmountCents:
          type: integer
        amountTotalCents:
          type: integer
        taxBehavior:
          type: string
          enum:
            - inclusive
            - exclusive
        taxCode:
          type: string
        taxBreakdown:
          type: array
          items:
            type: object
            properties:
              amount:
                type: integer
              inclusive:
                type: boolean
              taxabilityReason:
                type: string
                nullable: true
              taxableAmount:
                type: integer
                nullable: true
              state:
                type: string
                nullable: true
              taxType:
                type: string
                nullable: true
              percentageDecimal:
                type: string
                nullable: true
            required:
              - amount
              - inclusive
              - taxabilityReason
              - taxableAmount
              - state
              - taxType
              - percentageDecimal
        expiresAt:
          type: string
          format: date-time
      required:
        - calculationId
        - stripeCalculationId
        - purpose
        - customerState
        - customerPostalCode
        - amountCents
        - taxAmountCents
        - amountTotalCents
        - taxBehavior
        - taxCode
        - taxBreakdown
        - expiresAt
    AdminStripeTaxError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    AdminStripeTaxPreviewRequest:
      type: object
      properties:
        purpose:
          type: string
          enum:
            - subscription
            - commission
        amountCents:
          type: integer
          minimum: 0
          exclusiveMinimum: true
        state:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        postalCode:
          type: string
          minLength: 3
          maxLength: 10
        city:
          type: string
          maxLength: 80
        reference:
          type: string
          minLength: 1
          maxLength: 120
        subjectUid:
          type: string
          format: uuid
      required:
        - purpose
        - amountCents
        - state
        - reference
    AdminStripeTaxCalculationList:
      type: object
      properties:
        calculations:
          type: array
          items:
            $ref: "#/components/schemas/AdminStripeTaxCalculation"
      required:
        - calculations
    AdminStripeTaxRegistrationList:
      type: object
      properties:
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/AdminStripeTaxRegistration"
        hasMore:
          type: boolean
      required:
        - registrations
        - hasMore
    AdminStripeTaxRegistration:
      type: object
      properties:
        id:
          type: string
        state:
          type: string
          nullable: true
        registrationType:
          type: string
          nullable: true
        status:
          type: string
        activeFrom:
          type: string
          format: date-time
        expiresAt:
          type: string
          nullable: true
          format: date-time
      required:
        - id
        - state
        - registrationType
        - status
        - activeFrom
        - expiresAt
    AdminStripeTaxCreateRegistrationRequest:
      type: object
      properties:
        state:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        registrationType:
          type: string
          minLength: 1
          default: state_sales_tax
        activeFromUnixSec:
          type: integer
      required:
        - state
  parameters: {}
paths:
  /v1/healthz:
    get:
      tags:
        - health
      summary: Liveness probe
      description: Returns 200 as long as the isolate is up.
      responses:
        "200":
          description: Service is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /v1/readyz:
    get:
      tags:
        - health
      summary: Readiness probe
      description: Checks Postgres reachability over the Supavisor pooler. 503 +
        status=degraded when unreachable. (Supabase Auth + Storage + Realtime
        share this Postgres, so one check covers the data plane — ADR-0010.)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Degraded — Postgres unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/auth/role-claim:
    post:
      tags:
        - auth
      summary: Set the permanent role on the authenticated Supabase user
      description: Idempotent. Rejects with 409 if the user already has a role claim
        that differs from the request — role is permanent (ADR-0011 / CONTEXT §
        Authentication). `role` is one of {parent, caregiver, provider} (admin
        is internal-only, never self-assignable). A caregiver must include
        `categories`; a provider must include `specialty`. Supply roles
        (caregiver/provider) must include a resident `state` (drives per-state
        adapter routing, ADR-0009/0015); parent must not. Claims are written to
        Supabase `app_metadata`, and the supply identity (role,
        categories/specialty, state) is persisted to the `providers` table. The
        client must refresh its session to receive an access token carrying the
        new claims.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - parent
                    - caregiver
                    - provider
                categories:
                  type: array
                  items:
                    type: string
                    enum:
                      - babysitter
                      - tutor
                      - nanny
                  minItems: 1
                specialty:
                  type: string
                  enum:
                    - slp
                    - ot
                    - aba
                    - psychology
                    - other
                state:
                  type: string
                  enum:
                    - AL
                    - AK
                    - AZ
                    - AR
                    - CA
                    - CO
                    - CT
                    - DE
                    - DC
                    - FL
                    - GA
                    - HI
                    - ID
                    - IL
                    - IN
                    - IA
                    - KS
                    - KY
                    - LA
                    - ME
                    - MD
                    - MA
                    - MI
                    - MN
                    - MS
                    - MO
                    - MT
                    - NE
                    - NV
                    - NH
                    - NJ
                    - NM
                    - NY
                    - NC
                    - ND
                    - OH
                    - OK
                    - OR
                    - PA
                    - RI
                    - SC
                    - SD
                    - TN
                    - TX
                    - UT
                    - VT
                    - VA
                    - WA
                    - WV
                    - WI
                    - WY
              required:
                - role
      responses:
        "200":
          description: Role claim set (or already matching)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleClaimResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "409":
          description: Role already claimed (permanent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/issue:
    post:
      tags:
        - auth
      summary: Issue an email-OTP for the authenticated user
      description: Email-OTP fallback per CONTEXT § MFA posture — used for pre-paywall
        Parents without a phone on file. The notifier is a dev stub today;
        Resend wiring lands in OH-194.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailOtpIssueResponse"
        "400":
          description: No email on account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/verify:
    post:
      tags:
        - auth
      summary: Verify an email-OTP and open a step-up window
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      responses:
        "200":
          description: OTP verified — step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: OTP rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/step-up/refresh:
    post:
      tags:
        - auth
      summary: Record a fresh MFA challenge from a Supabase aal2 access token
      description: Called by clients after completing a Supabase MFA challenge (TOTP /
        phone factor). Reads the token's `aal` + `amr` claims and opens a
        15-minute step-up window in `auth_step_up_grants`. Rejects when the
        access token is not `aal2`.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: Access token is not aal2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/caregiver/connect/summary:
    get:
      tags:
        - caregiver
      summary: Read the authenticated Caregiver's Stripe Connect Express account summary
      description: "Returns the read-only Connect account state mirrored from
        `account.updated` webhooks: charges_enabled / payouts_enabled /
        details_submitted, the disabled_reason if Stripe paused the account, and
        the requirement lists (currently_due, past_due, pending_verification).
        `accountReady` is true iff both capabilities are enabled — the gate on
        verification activation + appearing in search (OH-190)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Connect account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/onboarding-link:
    post:
      tags:
        - caregiver
      summary: Create / reuse a Stripe Connect Express account and return a hosted
        onboarding URL
      description: "Idempotent: if the Caregiver already has a
        `provider_connect_accounts` row with a `stripe_account_id`, reuses it;
        otherwise creates a fresh Express account (type=express, country=US,
        capabilities=card_payments+transfers, business_type=individual) and
        stamps it onto the row. Returns a freshly-issued Stripe-hosted
        account-onboarding link (the KYC flow — PRD story 49). Precondition:
        Checkr screening has cleared (`screening_passed_at`)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Onboarding link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectOnboardingLink"
        "400":
          description: Screening not cleared / no email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "409":
          description: Verification terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/dashboard-link:
    post:
      tags:
        - caregiver
      summary: Issue a Stripe Express dashboard login link — requires step-up MFA
        (bank/withdrawal gate)
      description: "Returns a one-time Stripe Express dashboard login URL. Bank-detail
        edits and payout withdrawals both happen inside the Express dashboard,
        so this single MFA-gated endpoint satisfies OH-190 AC #3 (step-up MFA
        enforced on bank/withdrawal — PRD story 57). Requires a step-up MFA
        grant issued within the last 5 minutes (`POST
        /v1/auth/step-up/refresh`); without it the auth middleware returns 403
        `step_up_required`."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Dashboard login link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectDashboardLink"
        "400":
          description: Connect account missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role or step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/providers/me/verification:
    get:
      tags:
        - verification
      summary: Read the authenticated supply member's verification state + checklist
        facts
      description: Returns the current Verification state computed from per-step facts
        (email / phone / ID / screening / license) plus the raw timestamps that
        drive the verification checklist. Email + phone confirmations are
        mirrored from Supabase Auth on read so they reflect the latest session
        state. Scoped to the unified `providers` supply table, so both
        Caregivers and Providers use it.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Verification state + facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/verification/phone-confirm:
    post:
      tags:
        - verification
      summary: Mirror a completed Supabase phone confirmation into the verification
        facts
      description: Called by the client after it completes Supabase phone OTP
        (supabase.auth.verifyOtp). Fetches the user from the Supabase admin API,
        requires phone_confirmed_at, and records it on provider_verifications.
        Phone is the hard final activation gate (ADR-0015). Idempotent.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Phone confirmation mirrored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "400":
          description: Phone not yet confirmed in Supabase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/verification/id-doc:
    post:
      tags:
        - verification
      summary: Record a completed government-ID upload
      description: Called after the client uploads a government-issued ID through the
        signed-URL flow (POST /v1/uploads/signed-url → PUT to Supabase Storage).
        The body carries the returned objectPath; the server validates it is
        scoped to this user's id-doc namespace (id-doc/<uid>/) and records the
        upload timestamp.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdDocConfirmRequest"
      responses:
        "200":
          description: ID upload recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "400":
          description: objectPath not scoped to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/verification/screening/initiate:
    post:
      tags:
        - screening
      summary: Initiate the $35 Stripe charge + create a background-screening row
      description: Creates a `provider_screenings` row in `payment_pending` and a
        Stripe PaymentIntent for the screening fee. The applicant confirms the
        intent client-side; on `payment_intent.succeeded` the payments webhook
        enqueues a durable `screening.invite` job and the worker-tick creates
        the Checkr invitation (writing screening_initiated_at). Returns the
        PaymentIntent client_secret so the web portal can mount Stripe Elements.
        Rejects if the prior verification step (ID upload) is incomplete or a
        screening is already in flight / cleared.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Charge created + screening row opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningInitiateResponse"
        "400":
          description: Prior verification step incomplete (ID upload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "409":
          description: Screening already in flight or cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
  /v1/uploads/signed-url:
    post:
      tags:
        - uploads
      summary: Mint a one-time signed URL for a client-direct private Storage upload
      description: Returns a signed upload URL + token for a server-chosen,
        uid-namespaced object key in a private Supabase Storage bucket. The
        client PUTs the file with
        supabase.storage.from(bucket).uploadToSignedUrl(objectPath, token,
        file), then confirms the objectPath to the owning resource (id-doc →
        POST /v1/providers/me/verification/id-doc). Supply-scoped (caregiver /
        provider).
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedUploadUrlRequest"
      responses:
        "200":
          description: Signed upload URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUploadUrl"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
        "502":
          description: Storage failed to mint a signed URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
  /v1/webhooks/stripe-connect:
    post:
      tags:
        - webhooks
      summary: Stripe Connect Express webhook — mirrors account.updated onto
        provider_connect_accounts
      description: Receives Stripe Connect webhook deliveries (separate endpoint +
        signing secret from the screening webhook). Verifies the
        `Stripe-Signature` header with STRIPE_CONNECT_WEBHOOK_SECRET, then on
        `account.updated` mirrors charges_enabled / payouts_enabled /
        details_submitted / requirements / disabled_reason onto the row keyed by
        `stripe_account_id`. When both capabilities transition to enabled for
        the first time, stamps `account_ready_at`. Public route — the Stripe
        signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookError"
  /v1/webhooks/stripe-payments:
    post:
      tags:
        - webhooks
      summary: Stripe payments webhook — completes the screening charge + enqueues the
        Checkr invite
      description: Receives Stripe payments webhook deliveries (separate endpoint +
        signing secret from the Connect webhook). Verifies the
        `Stripe-Signature` header with STRIPE_PAYMENTS_WEBHOOK_SECRET, then on
        `payment_intent.succeeded` for a screening charge flips the screening
        row to `payment_succeeded` and enqueues a durable `screening.invite`
        outbox row (resolving the applicant identity from Supabase Auth). The
        worker-tick makes the slow Checkr invitation call. Public route — the
        Stripe signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentsWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentsWebhookError"
  /v1/webhooks/checkr:
    post:
      tags:
        - webhooks
      summary: Checkr (background-check vendor) webhook — drives the Verification
        state machine
      description: Receives Checkr `report.*` deliveries. Verifies the
        `X-Checkr-Signature` HMAC against CHECKR_WEBHOOK_SECRET, normalizes the
        payload via the vendor-agnostic adapter, folds the result into the
        verification facts (screening_passed_at / rejected_at), and stamps the
        raw payload onto `provider_screenings.raw_payload` for FCRA-windowed
        retention. Idempotent on `(vendor, vendor_report_id)`. Public route —
        the Checkr signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckrWebhookAck"
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckrWebhookError"
  /v1/admin/stripe-tax/preview-calculation:
    post:
      tags:
        - admin
        - tax
      summary: Compute a Stripe Tax preview for a purpose + US state + amount;
        persists an audit row
      description: "Calls Stripe Tax POST /v1/tax/calculations for either
        `subscription` (state = subscriber's resident state) or `commission`
        (state = Provider's resident state). Persists the result to
        `stripe_tax_calculations`. Used during launch verification to sample tax
        outcomes across states (OH-192 ACs #1 + #2) and at runtime as a preview
        before the Subscription/Commission flow charges. The purpose enum
        deliberately excludes Bookings — Our Haven does not collect sales tax on
        Bookings (CONTEXT § Sales tax model)."
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStripeTaxPreviewRequest"
      responses:
        "200":
          description: Tax calculation computed + persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxCalculation"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe Tax call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
  /v1/admin/stripe-tax/calculations:
    get:
      tags:
        - admin
        - tax
      summary: List recent Stripe Tax calculation audit rows
      description: Reads the `stripe_tax_calculations` audit table. Filterable by
        purpose, customer state, and subject uid. Returns up to 100 rows ordered
        by creation time (newest first).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - subscription
              - commission
          required: false
          name: purpose
          in: query
        - schema:
            type: string
            minLength: 2
            maxLength: 2
            pattern: ^[A-Z]{2}$
          required: false
          name: state
          in: query
        - schema:
            type: string
            format: uuid
          required: false
          name: subjectUid
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Audit rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxCalculationList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
  /v1/admin/stripe-tax/registrations:
    get:
      tags:
        - admin
        - tax
      summary: List Stripe Tax registrations (the nexus dashboard view)
      description: Mirrors Stripe Tax GET /v1/tax/registrations. Status defaults to
        `active`; pass `all` to include scheduled + expired. The source of truth
        admins use to see which states Our Haven is collecting in — and where
        Stripe is prompting registration as nexus is crossed.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - active
              - expired
              - scheduled
              - all
            default: active
          required: false
          name: status
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Registrations (nexus view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxRegistrationList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
    post:
      tags:
        - admin
        - tax
      summary: Register Our Haven for sales-tax collection in a US state — step-up MFA
        required
      description: Creates a Stripe Tax registration for the named US state
        (country=US, country_options[us][state]=...). Step-up-MFA gated because
        registering for sales-tax collection is a binding compliance action.
        Used both for the pre-registration posture in priority states (OH-163)
        and reactively when Stripe Tax surfaces a nexus threshold crossing.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStripeTaxCreateRegistrationRequest"
      responses:
        "200":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxRegistration"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP / step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
