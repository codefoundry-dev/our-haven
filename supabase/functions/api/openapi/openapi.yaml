      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    StripeBillingWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    CheckrWebhookAck:
      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    CheckrWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    AdminStripeTaxCalculation:
      type: object
      properties:
        calculationId:
          type: string
        stripeCalculationId:
          type: string
        purpose:
          type: string
          enum:
            - subscription
            - commission
        customerState:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        customerPostalCode:
          type: string
          nullable: true
        amountCents:
          type: integer
        taxAmountCents:
          type: integer
        amountTotalCents:
          type: integer
        taxBehavior:
          type: string
          enum:
            - inclusive
            - exclusive
        taxCode:
          type: string
        taxBreakdown:
          type: array
          items:
            type: object
            properties:
              amount:
                type: integer
              inclusive:
                type: boolean
              taxabilityReason:
                type: string
                nullable: true
              taxableAmount:
                type: integer
                nullable: true
              state:
                type: string
                nullable: true
              taxType:
                type: string
                nullable: true
              percentageDecimal:
                type: string
                nullable: true
            required:
              - amount
              - inclusive
              - taxabilityReason
              - taxableAmount
              - state
              - taxType
              - percentageDecimal
        expiresAt:
          type: string
          format: date-time
      required:
        - calculationId
        - stripeCalculationId
        - purpose
        - customerState
        - customerPostalCode
        - amountCents
        - taxAmountCents
        - amountTotalCents
        - taxBehavior
        - taxCode
        - taxBreakdown
        - expiresAt
    AdminStripeTaxError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    AdminStripeTaxPreviewRequest:
      type: object
      properties:
        purpose:
          type: string
          enum:
            - subscription
            - commission
        amountCents:
          type: integer
          minimum: 0
          exclusiveMinimum: true
        state:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        postalCode:
          type: string
          minLength: 3
          maxLength: 10
        city:
          type: string
          maxLength: 80
        reference:
          type: string
          minLength: 1
          maxLength: 120
        subjectUid:
          type: string
          format: uuid
      required:
        - purpose
        - amountCents
        - state
        - reference
    AdminStripeTaxCalculationList:
      type: object
      properties:
        calculations:
          type: array
          items:
            $ref: "#/components/schemas/AdminStripeTaxCalculation"
      required:
        - calculations
    AdminStripeTaxRegistrationList:
      type: object
      properties:
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/AdminStripeTaxRegistration"
        hasMore:
          type: boolean
      required:
        - registrations
        - hasMore
    AdminStripeTaxRegistration:
      type: object
      properties:
        id:
          type: string
        state:
          type: string
          nullable: true
        registrationType:
          type: string
          nullable: true
        status:
          type: string
        activeFrom:
          type: string
          format: date-time
        expiresAt:
          type: string
          nullable: true
          format: date-time
      required:
        - id
        - state
        - registrationType
        - status
        - activeFrom
        - expiresAt
    AdminStripeTaxCreateRegistrationRequest:
      type: object
      properties:
        state:
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
        registrationType:
          type: string
          minLength: 1
          default: state_sales_tax
        activeFromUnixSec:
          type: integer
      required:
        - state
    AdminDisputeList:
      type: object
      properties:
        disputes:
          type: array
          items:
            $ref: "#/components/schemas/AdminDispute"
      required:
        - disputes
    AdminDispute:
      type: object
      properties:
        id:
          type: string
        subjectType:
          type: string
          enum:
            - booking
            - job
        subjectId:
          type: string
        filedByUid:
          type: string
        reason:
          type: string
          enum:
            - overcharged
            - no-show
            - safety
            - quality
            - other
        details:
          type: string
          nullable: true
        inWindow:
          type: boolean
        holdApplied:
          type: boolean
        status:
          type: string
          enum:
            - open
            - resolved
            - dismissed
        createdAt:
          type: string
      required:
        - id
        - subjectType
        - subjectId
        - filedByUid
        - reason
        - details
        - inWindow
        - holdApplied
        - status
        - createdAt
    AdminDisputeError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    AdminDisputeResolved:
      type: object
      properties:
        id:
          type: string
        status:
