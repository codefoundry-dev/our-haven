        Direct-Message thread with a listable Caregiver (ADR-0011 — DM is
        Caregiver-only). Parent-Subscription-gated (402 on the free browse
        account). 404 if the supply member is unknown, not a Caregiver, or not
        listable (paused/unverified) — never reveal hidden supply.
      security:
        - supabaseAccessToken: []
      requestBody:
