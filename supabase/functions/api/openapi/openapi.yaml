              schema:
                $ref: "#/components/schemas/OfferError"
        "409":
          description: Transition not allowed from the Offer's current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
    delete:
      tags:
        - offers
      summary: Delete a still-pending Offer / Book-request — OH-208
      description: The sender hard-deletes their own still-pending Offer, removing it
        from the transcript as though never sent (its Trust & Safety flag, if
        any, cascades away). Never gated. 409 if the caller isn't the sender or
        the Offer is no longer pending (an accepted Offer must be withdrawn
        instead, which cascade-cancels its Bookings).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: offerId
          in: path
      responses:
        "200":
          description: The Offer was deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDeleted"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "404":
          description: Offer not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
        "409":
          description: Not the sender, or the Offer is no longer pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferError"
