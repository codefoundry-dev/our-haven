  /v1/supply/{providerId}/consultation-bookings:
    post:
      tags:
        - bookings
      summary: Book an open consultation slot (off-platform payment) — OH-203
      description: Books one of a listed Provider's OPEN consultation slots. Creates a
        per-session Provider Booking born `accepted` with NULL payment (no card
        charge, no payment intent, no Job/Offer) and holds the slot (open →
        held) atomically. Parent-only and Parent-Subscription-gated (402 on the
        free browse account). 404 if the Provider is unknown / not listable, or
        the slot does not belong to them; 409 if the slot is no longer open.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: providerId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationBookRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "402":
          description: No active Parent Subscription — booking gated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "403":
          description: Wrong role (caregiver / provider / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "404":
          description: Provider not found / not listable, or slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "409":
          description: Slot is no longer open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
  /v1/bookings:
    get:
      tags:
        - bookings
      summary: The caller's schedule (their consultation Bookings) — OH-203
      description: Returns the authenticated caller's Bookings — a Parent sees the
        ones they made; a Provider sees the ones on their calendar — each from
        the viewer's perspective with the counterparty's display name. v1
        contains only Provider consultations.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: The caller's bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingList"
        "401":
          description: Unauthenticated
          content:
            application/json:
