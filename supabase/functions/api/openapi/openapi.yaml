              $ref: "#/components/schemas/ParentSubscriptionCheckoutLinkRequest"
      responses:
        "200":
          description: Checkout link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionCheckoutLink"
        "400":
          description: No email on file / invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
