openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — single Hono fat Edge Function (ADR-0019). Source
    of truth per ADR-0004 (§§ 1–3, 8). US-region only.
  license:
    name: Proprietary
tags:
  - name: health
    description: Liveness and readiness probes
components:
  schemas:
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
        version:
          type: string
      required:
        - status
        - service
        - version
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
            - degraded
        checks:
          type: object
          properties:
            postgres:
              type: string
              enum:
                - ok
                - fail
          required:
            - postgres
      required:
        - status
        - checks
  parameters: {}
paths:
  /v1/healthz:
    get:
      tags:
        - health
      summary: Liveness probe
      description: Returns 200 as long as the isolate is up.
      responses:
        "200":
          description: Service is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /v1/readyz:
    get:
      tags:
        - health
      summary: Readiness probe
      description: Checks Postgres reachability over the Supavisor pooler. 503 +
        status=degraded when unreachable. (Supabase Auth + Storage + Realtime
        share this Postgres, so one check covers the data plane — ADR-0010.)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Degraded — Postgres unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
