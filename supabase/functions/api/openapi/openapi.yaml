      description: "Submits the caller's 1–5 star rating (+ optional text) for a
        `completed` Booking. Direction is derived from the caller: a Parent
        rates the supply member (a PUBLIC profile rating); a Caregiver/Provider
        rates the Parent (a supply-internal, aggregate-only rating). Ratings are
        BLIND — the mutual reveal happens once both sides submit or the 14-day
        window closes. 409 when the Booking isn't completed, the window has
        closed, or the caller already rated their side; 404 when the Booking
        isn't the caller's."
