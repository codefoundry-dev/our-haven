            application/json:
              schema:
                $ref: "#/components/schemas/ContactUsError"
  /v1/providers/me/verification/screening/initiate:
    post:
      tags:
        - screening
      summary: Initiate the $35 Stripe charge + create a background-screening row
      description: Creates a `provider_screenings` row in `payment_pending` and a
        Stripe PaymentIntent for the screening fee. The applicant confirms the
        intent client-side; on `payment_intent.succeeded` the payments webhook
        enqueues a durable `screening.invite` job and the worker-tick creates
        the Checkr invitation (writing screening_initiated_at). Returns the
        PaymentIntent client_secret so the web portal can mount Stripe Elements.
        Rejects if the prior verification step (ID upload) is incomplete or a
        screening is already in flight / cleared.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Charge created + screening row opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningInitiateResponse"
        "400":
          description: Prior verification step incomplete (ID upload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
        "409":
          description: Screening already in flight or cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningError"
  /v1/uploads/signed-url:
    post:
      tags:
        - uploads
      summary: Mint a one-time signed URL for a client-direct Storage upload
      description: Returns a signed upload URL + token for a server-chosen,
        uid-namespaced object key in a Supabase Storage bucket (private id-docs
        for documents; public avatars for the profile photo). The client PUTs
        the file with
        supabase.storage.from(bucket).uploadToSignedUrl(objectPath, token,
        file), then confirms the objectPath to the owning resource (id-doc →
        POST /v1/providers/me/verification/id-doc; license-doc → POST
        /v1/providers/me/credentials/license; insurance-doc → POST
        /v1/providers/me/credentials/insurance; state-childcare-registration →
        POST /v1/providers/me/home-childcare-registration; avatar → PATCH
        /v1/providers/me/profile { photoObjectPath }). Supply-scoped (caregiver
        / provider).
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedUploadUrlRequest"
      responses:
        "200":
          description: Signed upload URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUploadUrl"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
        "502":
          description: Storage failed to mint a signed URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsError"
  /v1/webhooks/stripe-connect:
    post:
      tags:
        - webhooks
      summary: Stripe Connect Express webhook — mirrors account.updated onto
        provider_connect_accounts
      description: Receives Stripe Connect webhook deliveries (separate endpoint +
        signing secret from the screening webhook). Verifies the
        `Stripe-Signature` header with STRIPE_CONNECT_WEBHOOK_SECRET, then on
        `account.updated` mirrors charges_enabled / payouts_enabled /
        details_submitted / requirements / disabled_reason onto the row keyed by
        `stripe_account_id`. When both capabilities transition to enabled for
        the first time, stamps `account_ready_at`. Public route — the Stripe
        signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookError"
  /v1/webhooks/stripe-payments:
    post:
      tags:
        - webhooks
      summary: Stripe payments webhook — completes the screening charge + enqueues the
        Checkr invite
      description: Receives Stripe payments webhook deliveries (separate endpoint +
        signing secret from the Connect webhook). Verifies the
        `Stripe-Signature` header with STRIPE_PAYMENTS_WEBHOOK_SECRET, then on
        `payment_intent.succeeded` for a screening charge flips the screening
        row to `payment_succeeded` and enqueues a durable `screening.invite`
        outbox row (resolving the applicant identity from Supabase Auth). The
        worker-tick makes the slow Checkr invitation call. Public route — the
        Stripe signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentsWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentsWebhookError"
  /v1/webhooks/stripe-billing:
    post:
      tags:
        - webhooks
      summary: Stripe Billing webhook — mirrors the Provider + Parent Subscription
        lifecycles onto their tables
      description: Receives Stripe Billing webhook deliveries (separate endpoint +
        signing secret from the Connect + payments webhooks) for BOTH the
        Provider Subscription (OH-191) and the Parent Subscription (OH-193).
        Verifies the `Stripe-Signature` header with
        STRIPE_BILLING_WEBHOOK_SECRET, then routes each event by its metadata
        (`purpose` + `uid`/`provider_id`, falling back to a customer-id probe)
        to provider_subscriptions or parent_subscriptions — on
        checkout.session.completed linking the subscription id and on
        customer.subscription.* mirroring status / current_period_end /
        cancel_at_period_end / price, stamping the first-access marker on the
        first active/trialing transition. Public route — the Stripe signature is
        the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeBillingWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeBillingWebhookError"
  /v1/webhooks/checkr:
    post:
      tags:
        - webhooks
      summary: Checkr (background-check vendor) webhook — drives the Verification
        state machine
      description: Receives Checkr `report.*` deliveries. Verifies the
        `X-Checkr-Signature` HMAC against CHECKR_WEBHOOK_SECRET, normalizes the
        payload via the vendor-agnostic adapter, folds the result into the
        verification facts (screening_passed_at / rejected_at), and stamps the
        raw payload onto `provider_screenings.raw_payload` for FCRA-windowed
        retention. Idempotent on `(vendor, vendor_report_id)`. Public route —
        the Checkr signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckrWebhookAck"
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckrWebhookError"
  /v1/admin/stripe-tax/preview-calculation:
    post:
      tags:
        - admin
        - tax
      summary: Compute a Stripe Tax preview for a purpose + US state + amount;
        persists an audit row
      description: "Calls Stripe Tax POST /v1/tax/calculations for either
        `subscription` (state = subscriber's resident state) or `commission`
        (state = Provider's resident state). Persists the result to
        `stripe_tax_calculations`. Used during launch verification to sample tax
        outcomes across states (OH-192 ACs #1 + #2) and at runtime as a preview
        before the Subscription/Commission flow charges. The purpose enum
        deliberately excludes Bookings — Our Haven does not collect sales tax on
        Bookings (CONTEXT § Sales tax model)."
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStripeTaxPreviewRequest"
      responses:
        "200":
          description: Tax calculation computed + persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxCalculation"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe Tax call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
  /v1/admin/stripe-tax/calculations:
    get:
      tags:
        - admin
        - tax
      summary: List recent Stripe Tax calculation audit rows
      description: Reads the `stripe_tax_calculations` audit table. Filterable by
        purpose, customer state, and subject uid. Returns up to 100 rows ordered
        by creation time (newest first).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - subscription
              - commission
          required: false
          name: purpose
          in: query
        - schema:
            type: string
            minLength: 2
            maxLength: 2
            pattern: ^[A-Z]{2}$
          required: false
          name: state
          in: query
        - schema:
            type: string
            format: uuid
          required: false
          name: subjectUid
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Audit rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxCalculationList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
  /v1/admin/stripe-tax/registrations:
    get:
      tags:
        - admin
        - tax
      summary: List Stripe Tax registrations (the nexus dashboard view)
      description: Mirrors Stripe Tax GET /v1/tax/registrations. Status defaults to
        `active`; pass `all` to include scheduled + expired. The source of truth
        admins use to see which states Our Haven is collecting in — and where
        Stripe is prompting registration as nexus is crossed.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - active
              - expired
              - scheduled
              - all
            default: active
          required: false
          name: status
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Registrations (nexus view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxRegistrationList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
    post:
      tags:
        - admin
        - tax
      summary: Register Our Haven for sales-tax collection in a US state — step-up MFA
        required
      description: Creates a Stripe Tax registration for the named US state
        (country=US, country_options[us][state]=...). Step-up-MFA gated because
        registering for sales-tax collection is a binding compliance action.
        Used both for the pre-registration posture in priority states (OH-163)
        and reactively when Stripe Tax surfaces a nexus threshold crossing.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStripeTaxCreateRegistrationRequest"
      responses:
        "200":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxRegistration"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP / step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
  /v1/admin/disputes:
    get:
      tags:
        - admin
      summary: List disputes (admin queue) — OH-213
      description: The dispute queue — in-window holds, out-of-window escalations,
        past-Job complaints, and no-shows. Defaults to `open`; pass `?status=`
        to view resolved/dismissed.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - open
              - resolved
              - dismissed
          required: false
          name: status
          in: query
      responses:
        "200":
          description: The dispute queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
        "403":
          description: Not an admin (or no aal2/TOTP)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
  /v1/admin/disputes/{disputeId}/resolve:
    post:
      tags:
        - admin
      summary: Resolve a dispute — release / refund / clawback / dismiss — OH-213
      description: Resolves an open dispute. For a `disputed` Booking (held payout)
        `released` captures the payout to the Caregiver and
        `refunded`/`clawback` refunds the Parent; an out-of-window escalation
        refunds (or dismisses); a no-show `dismissed` clears the supply flag +
        lifts any suspension. Step-up-MFA gated (money movement).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: disputeId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDisputeResolveRequest"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeResolved"
        "400":
          description: Invalid resolution for this subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
        "403":
          description: Not an admin / step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
        "404":
          description: Dispute not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
        "409":
          description: Already resolved, or not resolvable that way
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDisputeError"
