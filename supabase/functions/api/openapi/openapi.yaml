          description: Billing Portal link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionPortalLink"
        "400":
          description: No Stripe Customer (start checkout first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSubscriptionError"
        "404":
