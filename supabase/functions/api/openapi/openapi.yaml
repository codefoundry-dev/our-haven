          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesError"
    patch:
      tags:
        - notifications
      summary: Update the authenticated user's notification channel preferences
      description: Partial update — only the channels named in the body change; the
        rest keep their current value (or the all-on default if no row exists
        yet). Upserts, so the first change materialises the row. Returns the
        full effective preferences after the change.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
