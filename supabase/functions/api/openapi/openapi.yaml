      summary: Report a supply no-show → full refund + supply flag — OH-213
      description: Reports that the Caregiver/Provider did not show for an `accepted`
        Booking (CONTEXT § No-show). A Caregiver no-show → the Booking is
        cancelled, the authorization hold is released in full, and the Caregiver
        is auto-flagged (2 flags → manual review, 3 → suspension). A Provider
        consultation no-show is a supply-quality flag only (no money).
        Reportable only at/after the scheduled start; 409 otherwise.
      security:
        - supabaseAccessToken: []
      parameters:
