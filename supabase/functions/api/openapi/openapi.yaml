              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
  /v1/parents/me/subscription/checkout-link:
    post:
      tags:
        - subscription
      summary: Create / reuse a Stripe Customer and return a hosted subscription
        Checkout URL
      description: 'Idempotent on the Customer: if the Parent already has a
        `parent_subscriptions` row with a `stripe_customer_id`, reuses it;
        otherwise creates a Stripe Customer and stamps it onto the row before
        returning. Returns a Stripe-hosted Checkout Session URL in subscription
        mode (STRIPE_PARENT_SUBSCRIPTION_PRICE_ID). Supports Stripe Promotion
        Codes: by default the hosted "Add promotion code" field is shown; an
        optional `promotionCode` (promo_…) pre-applies a launch promo instead.
        The request body is optional — a bodyless POST starts a standard
        checkout. On completion Stripe redirects to
        STRIPE_PARENT_SUBSCRIPTION_SUCCESS_URL and the billing webhook unlocks
        access.'
      security:
        - supabaseAccessToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParentSubscriptionCheckoutLinkRequest"
      responses:
        "200":
          description: Checkout link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionCheckoutLink"
        "400":
          description: No email on file / invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
  /v1/parents/me/subscription/portal-link:
    post:
      tags:
        - subscription
      summary: Issue a Stripe Billing Portal login link — manage / cancel the
        subscription
      description: Returns a one-time Stripe Billing Portal URL where the Parent can
        update their payment method or cancel the Parent Subscription. A
        cancellation flows back through the billing webhook, which walls access
        once the subscription ends. Requires an existing Stripe Customer (start
        checkout first).
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Billing Portal link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionPortalLink"
        "400":
          description: No Stripe Customer (start checkout first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentSubscriptionError"
  /v1/parents/me/profile:
    get:
      tags:
        - parent-profile
      summary: Read the authenticated Parent's family profile
      description: "Returns the family-level Parent profile: Bio, the Preferences
        checklist, the consent-gated Safety-Behaviors checklist with its consent
        timestamp (`safetyBehaviorsConsentAt`) + derived `hasConsent`, and the
        optional default service address. A Parent with no profile row yet reads
        sensible empties (no write). Supply / admin roles are rejected by the
        parent-only guard (403)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: The Parent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "403":
          description: Wrong role (caregiver / provider / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
    patch:
      tags:
        - parent-profile
      summary: Update the authenticated Parent's Bio / Preferences / default address
      description: "Partial update of the NON-sensitive fields — only the supplied
        fields change. `preferences`, when present, replaces the FULL checklist
        (validated against the taxonomy + de-duped). `defaultAddress`, when
        present, replaces the FULL default address (validated: 2-letter US
        state, 5-digit ZIP). Safety Behaviors are NOT settable here — they go
        through the consent-gated `PUT …/safety-behaviors` (the consent-to-store
        gate)."
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParentProfilePatchRequest"
      responses:
        "200":
          description: The updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfile"
        "400":
          description: Invalid fields / address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
  /v1/parents/me/profile/consent:
    post:
      tags:
        - parent-profile
      summary: Grant sensitive-information consent (stamp the consent timestamp)
      description: "Records the explicit, timestamped sensitive-info consent that
        unlocks saving Safety Behaviors (PRD story 3). Idempotent: a first grant
        stamps now; a repeat grant keeps the original timestamp. After this the
        Parent may PUT their Safety-Behaviors checklist."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Consent recorded; returns the profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
    delete:
      tags:
        - parent-profile
      summary: Withdraw sensitive-information consent — erases Safety Behaviors +
        timestamp
      description: Withdraws consent and permanently deletes every Safety Behavior AND
        the consent timestamp (PRD story 74). Bio + Preferences are untouched.
        Idempotent — withdrawing with nothing stored is a no-op that returns the
        (empty-sensitive) profile.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Consent withdrawn + behaviours erased; returns the profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
  /v1/parents/me/profile/safety-behaviors:
    put:
      tags:
        - parent-profile
      summary: Replace the authenticated Parent's Safety-Behaviors checklist
        (consent-gated)
      description: Replaces the full Safety-Behaviors checklist (validated against the
        taxonomy + de-duped). REQUIRES sensitive-info consent to already be in
        force — without it the request is rejected 403 `consent_required` (the
        consent-to-store gate, PRD story 3). To remove every behaviour, withdraw
        consent (which also clears the timestamp) rather than PUTting an empty
        list.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParentSafetyBehaviorsRequest"
      responses:
        "200":
          description: The updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfile"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
        "403":
          description: Wrong role / consent required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentProfileError"
  /v1/search:
    get:
      tags:
        - search
      summary: Unified Search across Caregivers + Providers (filters, hybrid ranking,
        preview wall)
      description: Returns activated, listable supply matching the filters, ranked by
        the hybrid scorer, with the blur-to-unblur preview wall applied for
        non-entitled Parents (top 1–2 full per category, the rest blurred
        teasers). An entitled Parent (active|trialing Subscription) sees
        everything unblurred. Parent-only.
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            enum:
              - all
              - caregiver
              - provider
            default: all
            description: Which supply roles to search. Default both.
          required: false
          description: Which supply roles to search. Default both.
          name: role
          in: query
        - schema:
            type: string
            description: CSV of Caregiver categories (babysitter,tutor,nanny). Caregiver
              results matching ANY are kept.
          required: false
          description: CSV of Caregiver categories (babysitter,tutor,nanny). Caregiver
            results matching ANY are kept.
          name: category
          in: query
        - schema:
            type: string
            description: CSV of Provider specialties / "license type"
              (slp,ot,aba,psychology,other).
          required: false
          description: CSV of Provider specialties / "license type"
            (slp,ot,aba,psychology,other).
          name: specialty
          in: query
        - schema:
            type: string
            pattern: ^\d{5}$
            description: 5-digit US ZIP — the search origin for ZIP+radius.
          required: false
          description: 5-digit US ZIP — the search origin for ZIP+radius.
          name: zip
          in: query
        - schema:
            type: number
            minimum: 0
            exclusiveMinimum: true
            maximum: 500
            description: Search radius in miles (default 5). Applied only to candidates
              whose ZIP resolves to a centroid.
          required: false
          description: Search radius in miles (default 5). Applied only to candidates
            whose ZIP resolves to a centroid.
          name: radiusMiles
          in: query
        - schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            description: ISO date for the date/time filter (with startMin+endMin).
          required: false
          description: ISO date for the date/time filter (with startMin+endMin).
          name: date
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
            maximum: 1440
            description: Window start, minutes since midnight (0–1440).
          required: false
          description: Window start, minutes since midnight (0–1440).
          name: startMin
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
            maximum: 1440
            description: Window end, minutes since midnight (start < end ≤ 1440).
          required: false
          description: Window end, minutes since midnight (start < end ≤ 1440).
          name: endMin
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
            description: Hourly Rate ceiling in cents, matched against the "from $X" lowest
              published rate.
          required: false
          description: Hourly Rate ceiling in cents, matched against the "from $X" lowest
            published rate.
          name: maxRateCents
          in: query
        - schema:
            type: number
            nullable: true
            minimum: 0
            maximum: 5
            description: "Minimum star Rating (0–5). Cold start: unrated supply passes."
          required: false
          description: "Minimum star Rating (0–5). Cold start: unrated supply passes."
          name: minRating
          in: query
        - schema:
            type: string
            enum:
              - "true"
              - "false"
            description: When "true", only W-10 Tax-credit-friendly Caregivers
              (Babysitter/Nanny).
          required: false
          description: When "true", only W-10 Tax-credit-friendly Caregivers
            (Babysitter/Nanny).
          name: taxCreditFriendly
          in: query
        - schema:
            type: string
            description: CSV of age bands (infant,toddler,preschool,school-age,teen).
              Matches on overlap.
          required: false
          description: CSV of age bands (infant,toddler,preschool,school-age,teen).
            Matches on overlap.
          name: agesServed
          in: query
        - schema:
            type: string
            description: CSV of Safety-Behaviors (Caregiver behaviour-comfort). Matches on
              overlap.
          required: false
          description: CSV of Safety-Behaviors (Caregiver behaviour-comfort). Matches on
            overlap.
          name: behaviourComfort
          in: query
        - schema:
            type: string
            enum:
              - in_person
              - telehealth
            description: Provider delivery mode. Accepted but NOT YET applied (no backing
              column).
          required: false
          description: Provider delivery mode. Accepted but NOT YET applied (no backing
            column).
          name: delivery
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 60
            description: Max results returned (the top-ranked page). Default 60.
          required: false
          description: Max results returned (the top-ranked page). Default 60.
          name: limit
          in: query
      responses:
        "200":
          description: Ranked, preview-walled search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Invalid date/time window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
        "403":
          description: Wrong role (caregiver / provider / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
  /v1/supply/{providerId}:
