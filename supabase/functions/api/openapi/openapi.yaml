                $ref: "#/components/schemas/ConsultationBookingError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
  /v1/bookings/{bookingId}/cancel:
    post:
      tags:
        - bookings
      summary: Cancel a consultation Booking (releases the held slot) — OH-203
      description: Cancels a still-`accepted` Provider consultation — Parent
        (`parent-cancel`) or Provider (`provider-cancel`). NULL payment, so
        cancellation just releases the held slot (held → released). 404 if the
        Booking is not the caller's; 409 if it is past the cancellable window
        (already completed/cancelled).
      security:
        - supabaseAccessToken: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: bookingId
          in: path
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingCancel"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "404":
          description: Booking not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
        "409":
          description: Not cancellable from its current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationBookingError"
