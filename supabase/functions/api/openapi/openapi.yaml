      description: Returns the caller's per-channel notification preferences (`push` /
        `webPush` / `email` / `sms`). A user who has never changed a preference
        has no row; the endpoint synthesises the all-on default. `sms` reflects
        the stored flag but mandatory safety SMS always sends regardless
        (CONTEXT § Notifications).
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Effective preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
