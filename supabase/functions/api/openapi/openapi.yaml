  parameters: {}
paths:
  /v1/healthz:
    get:
      tags:
        - health
      summary: Liveness probe
      description: Returns 200 as long as the isolate is up.
      responses:
        "200":
          description: Service is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /v1/readyz:
    get:
      tags:
        - health
      summary: Readiness probe
      description: Checks Postgres reachability over the Supavisor pooler. 503 +
        status=degraded when unreachable. (Supabase Auth + Storage + Realtime
        share this Postgres, so one check covers the data plane — ADR-0010.)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Degraded — Postgres unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/auth/role-claim:
    post:
      tags:
        - auth
      summary: Set the permanent role on the authenticated Supabase user
      description: Idempotent. Rejects with 409 if the user already has a role claim
        that differs from the request — role is permanent (ADR-0011 / CONTEXT §
        Authentication). `role` is one of {parent, caregiver, provider} (admin
        is internal-only, never self-assignable). A caregiver must include
        `categories`; a provider must include `specialty`. Supply roles
        (caregiver/provider) must include a resident `state` (drives per-state
        adapter routing, ADR-0009/0015); parent must not. Claims are written to
        Supabase `app_metadata`, and the supply identity (role,
        categories/specialty, state) is persisted to the `providers` table. The
        client must refresh its session to receive an access token carrying the
        new claims.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - parent
                    - caregiver
                    - provider
                categories:
                  type: array
                  items:
                    type: string
                    enum:
                      - babysitter
                      - tutor
                      - nanny
                  minItems: 1
                specialty:
                  type: string
                  enum:
                    - slp
                    - ot
                    - aba
                    - psychology
                    - other
                state:
                  type: string
                  enum:
                    - AL
                    - AK
                    - AZ
                    - AR
                    - CA
                    - CO
                    - CT
                    - DE
                    - DC
                    - FL
                    - GA
                    - HI
                    - ID
                    - IL
                    - IN
                    - IA
                    - KS
                    - KY
                    - LA
                    - ME
                    - MD
                    - MA
                    - MI
                    - MN
                    - MS
                    - MO
                    - MT
                    - NE
                    - NV
                    - NH
                    - NJ
                    - NM
                    - NY
                    - NC
                    - ND
                    - OH
                    - OK
                    - OR
                    - PA
                    - RI
                    - SC
                    - SD
                    - TN
                    - TX
                    - UT
                    - VT
                    - VA
                    - WA
                    - WV
                    - WI
                    - WY
              required:
                - role
      responses:
        "200":
          description: Role claim set (or already matching)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleClaimResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "409":
          description: Role already claimed (permanent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/issue:
    post:
      tags:
        - auth
      summary: Issue an email-OTP for the authenticated user
      description: Email-OTP fallback per CONTEXT § MFA posture — used for pre-paywall
        Parents without a phone on file. The notifier is a dev stub today;
        Resend wiring lands in OH-194.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailOtpIssueResponse"
        "400":
          description: No email on account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/verify:
    post:
      tags:
        - auth
      summary: Verify an email-OTP and open a step-up window
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      responses:
        "200":
          description: OTP verified — step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: OTP rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/step-up/refresh:
    post:
      tags:
        - auth
      summary: Record a fresh MFA challenge from a Supabase aal2 access token
      description: Called by clients after completing a Supabase MFA challenge (TOTP /
        phone factor). Reads the token's `aal` + `amr` claims and opens a
        15-minute step-up window in `auth_step_up_grants`. Rejects when the
        access token is not `aal2`.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: Access token is not aal2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/web-handoff:
    post:
      tags:
        - auth
      summary: Mint a single-use handoff URL that logs the caller into the web app
        (OH-221)
      description: Returns a `${WEB_APP_URL}/handoff?token_hash=…&next=…` link. The
        mobile Caregiver Account tab opens it in an in-app browser to reach a
        payout-management action that lives on the web portal (bank-detail
        changes / withdrawals — PRD story 80); the web `/handoff` route
        exchanges the token for a Supabase session and routes to `next`. The
        token is a single-use Supabase magic-link OTP minted for the caller's
        own email via the admin API (no email is sent), so it grants no more
        than the caller already has. Requires an email on the account.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                next:
                  type: string
                  maxLength: 512
      responses:
        "200":
          description: Handoff URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebHandoffResponse"
        "400":
          description: No email on account, or handoff mint failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/caregiver/connect/summary:
    get:
      tags:
        - caregiver
      summary: Read the authenticated Caregiver's Stripe Connect Express account summary
      description: "Returns the read-only Connect account state mirrored from
        `account.updated` webhooks: charges_enabled / payouts_enabled /
        details_submitted, the disabled_reason if Stripe paused the account, and
        the requirement lists (currently_due, past_due, pending_verification).
        `accountReady` is true iff both capabilities are enabled — the gate on
        verification activation + appearing in search (OH-190)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Connect account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/onboarding-link:
    post:
      tags:
        - caregiver
      summary: Create / reuse a Stripe Connect Express account and return a hosted
        onboarding URL
      description: "Idempotent: if the Caregiver already has a
        `provider_connect_accounts` row with a `stripe_account_id`, reuses it;
        otherwise creates a fresh Express account (type=express, country=US,
        capabilities=card_payments+transfers, business_type=individual) and
        stamps it onto the row. Returns a freshly-issued Stripe-hosted
        account-onboarding link (the KYC flow — PRD story 49). Precondition:
        Checkr screening has cleared (`screening_passed_at`)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Onboarding link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectOnboardingLink"
        "400":
          description: Screening not cleared / no email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "409":
          description: Verification terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/dashboard-link:
    post:
      tags:
        - caregiver
      summary: Issue a Stripe Express dashboard login link — requires step-up MFA
        (bank/withdrawal gate)
      description: "Returns a one-time Stripe Express dashboard login URL. Bank-detail
        edits and payout withdrawals both happen inside the Express dashboard,
        so this single MFA-gated endpoint satisfies OH-190 AC #3 (step-up MFA
        enforced on bank/withdrawal — PRD story 57). Requires a step-up MFA
        grant issued within the last 5 minutes (`POST
        /v1/auth/step-up/refresh`); without it the auth middleware returns 403
        `step_up_required`."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Dashboard login link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectDashboardLink"
        "400":
          description: Connect account missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role or step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/payouts:
    get:
      tags:
        - caregiver
      summary: The Caregiver's read-only payouts list — OH-221
      description: Returns the authenticated Caregiver's settled payouts — their `kind
        = 'caregiver'` Bookings whose payment has reached `captured` or
        `refunded` — newest first, with a glance total of net take-home. A
        payout is a captured destination charge (OH-211); withdrawal + bank
        changes happen in the Stripe Express dashboard (reached via the web
        handoff), not here. `netCents` is a display estimate (gross − Commission
        − refund); Stripe holds the authoritative balance.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: The payouts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverPayoutList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverPayoutError"
        "403":
          description: Wrong role (Providers have no payouts)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverPayoutError"
  /v1/providers/me/verification:
    get:
      tags:
        - verification
      summary: Read the authenticated supply member's verification state + checklist
        facts
      description: Returns the current Verification state computed from per-step facts
        (email / phone / ID / screening / license) plus the raw timestamps that
        drive the verification checklist. Email + phone confirmations are
        mirrored from Supabase Auth on read so they reflect the latest session
        state. Scoped to the unified `providers` supply table, so both
        Caregivers and Providers use it.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Verification state + facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/verification/phone-confirm:
    post:
      tags:
        - verification
      summary: Mirror a completed Supabase phone confirmation into the verification
        facts
      description: Called by the client after it completes Supabase phone OTP
        (supabase.auth.verifyOtp). Fetches the user from the Supabase admin API,
        requires phone_confirmed_at, and records it on provider_verifications.
        Phone is the hard final activation gate (ADR-0015). Idempotent.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Phone confirmation mirrored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "400":
          description: Phone not yet confirmed in Supabase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/verification/id-doc:
    post:
      tags:
        - verification
      summary: Record a completed government-ID upload
      description: Called after the client uploads a government-issued ID through the
        signed-URL flow (POST /v1/uploads/signed-url → PUT to Supabase Storage).
        The body carries the returned objectPath; the server validates it is
        scoped to this user's id-doc namespace (id-doc/<uid>/) and records the
        upload timestamp.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdDocConfirmRequest"
      responses:
        "200":
          description: ID upload recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyVerification"
        "400":
          description: objectPath not scoped to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "403":
          description: Wrong role (parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationError"
  /v1/providers/me/credentials:
    get:
      tags:
        - verification
      summary: Read the authenticated Provider's license + insurance credentials
      description: Returns the per-state license-board context (board name, register
        URL, hint) resolved from the resident state + specialty, plus the
        current upload + decision state. Caregivers are rejected by the
        provider-only role guard (403) — they never need a license; Checkr alone
        suffices.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: License + insurance credential state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentials"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialsError"
        "403":
          description: Wrong role (caregiver / parent / admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialsError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialsError"
        "409":
          description: Not a clinical Provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialsError"
    post:
      tags:
        - profile
      summary: Add a Caregiver Credential (title / certification / training)
      description: Creates a Credential in `pending` review — hidden from the public
        profile until an admin approves it. A `title` that reads as a licensed
        clinical role is accepted but flagged (`clinicalFlag`) so the UI can
        warn it may be rejected (protecting the Caregiver/Provider line). Never
        gates activation.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaregiverCredentialCreateRequest"
      responses:
        "201":
