              schema:
                $ref: "#/components/schemas/BookingTipError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingTipError"
        "404":
          description: Booking not found (or not the caller's)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingTipError"
        "409":
          description: Not tippable (kind/state) or the tip already settled
