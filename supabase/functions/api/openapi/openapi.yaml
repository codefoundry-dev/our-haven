    get:
      tags:
        - profile
      summary: List the authenticated Provider's published consultation slots
      description: Returns the Provider's active consultation slots (open + held;
        withdrawn/released ones are omitted), each with its bookable flag. Open
        slots are what the M2.7 scheduler surfaces to Parents.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: The published slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationSlotList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
    post:
      tags:
        - profile
      summary: Publish a bookable consultation slot
      description: Lists a new consultation window (born `open`, immediately
        bookable). The date must be YYYY-MM-DD and the window 0 ≤ startMin <
        endMin ≤ 1440. Requires an active Provider Subscription (OH-191) —
        publishing a bookable slot is what "enables consultation Bookings", so a
        Provider who is not listed is rejected with 402. Rejected with 409 if it
        overlaps an existing active slot on the same day (a Provider cannot
        double-book a window).
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationSlotCreateRequest"
      responses:
        "201":
          description: Slot published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationSlot"
        "400":
          description: Invalid date / window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "402":
          description: No active Provider Subscription — listing gated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "403":
          description: Wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "404":
          description: Supply (provider) row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
        "409":
          description: Overlaps an existing slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfileError"
