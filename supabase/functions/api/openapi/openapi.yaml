      responses:
        "200":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxRegistration"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "403":
          description: Not an admin / TOTP / step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
        "502":
          description: Stripe call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeTaxError"
