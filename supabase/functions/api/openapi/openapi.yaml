        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/verify:
    post:
      tags:
        - auth
      summary: Verify an email-OTP and open a step-up window
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      responses:
        "200":
          description: OTP verified — step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
