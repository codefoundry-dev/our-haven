openapi: 3.1.0
info:
  title: Our Haven API
  version: 0.0.0
  description: Our Haven v1 API — single Hono fat Edge Function (ADR-0019). Source
    of truth per ADR-0004 (§§ 1–3, 8). US-region only.
  license:
    name: Proprietary
servers:
  - url: https://<project-ref>.supabase.co/functions/v1/api
    description: Supabase Edge Function (production) — replace <project-ref>.
  - url: http://localhost:54321/functions/v1/api
    description: Local (supabase functions serve)
tags:
  - name: health
    description: Liveness and readiness probes
  - name: auth
    description: Authentication — role-claim, email-OTP, step-up MFA
  - name: caregiver
    description: Caregiver Stripe Connect Express — onboarding, summary, dashboard (OH-190)
  - name: webhooks
    description: Vendor webhooks — Stripe Connect account.updated (OH-190)
components:
  securitySchemes:
    supabaseAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token (HS256). Verified locally with the
        project JWT secret on every request.
  schemas:
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
        version:
          type: string
      required:
        - status
        - service
        - version
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
            - degraded
        checks:
          type: object
          properties:
            postgres:
              type: string
              enum:
                - ok
                - fail
          required:
            - postgres
      required:
        - status
        - checks
    RoleClaimResponse:
      type: object
      properties:
        role:
          type: string
          enum:
            - parent
            - caregiver
            - provider
        categories:
          type: array
          nullable: true
          items:
            type: string
            enum:
              - babysitter
              - tutor
              - nanny
        specialty:
          type: string
          nullable: true
          enum:
            - slp
            - ot
            - aba
            - psychology
            - other
            - null
        state:
          type: string
          nullable: true
          enum:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - DC
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
            - null
      required:
        - role
        - categories
        - specialty
        - state
    AuthErrorResponse:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    EmailOtpIssueResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
      required:
        - id
        - expiresAt
    StepUpRefreshResponse:
      type: object
      properties:
        secondFactor:
          type: string
          enum:
            - totp
            - phone
        grantedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      required:
        - secondFactor
        - grantedAt
        - expiresAt
    CaregiverConnectSummary:
      type: object
      properties:
        hasAccount:
          type: boolean
        stripeAccountId:
          type: string
          nullable: true
        chargesEnabled:
          type: boolean
        payoutsEnabled:
          type: boolean
        detailsSubmitted:
          type: boolean
        disabledReason:
          type: string
          nullable: true
        accountReady:
          type: boolean
        accountReadyAt:
          type: string
          nullable: true
          format: date-time
        requirementsCurrentlyDue:
          type: array
          items:
            type: string
        requirementsPastDue:
          type: array
          items:
            type: string
        requirementsPendingVerification:
          type: array
          items:
            type: string
        lastWebhookAt:
          type: string
          nullable: true
          format: date-time
      required:
        - hasAccount
        - stripeAccountId
        - chargesEnabled
        - payoutsEnabled
        - detailsSubmitted
        - disabledReason
        - accountReady
        - accountReadyAt
        - requirementsCurrentlyDue
        - requirementsPastDue
        - requirementsPendingVerification
        - lastWebhookAt
    CaregiverConnectError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
    CaregiverConnectOnboardingLink:
      type: object
      properties:
        stripeAccountId:
          type: string
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
      required:
        - stripeAccountId
        - url
        - expiresAt
    CaregiverConnectDashboardLink:
      type: object
      properties:
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
      required:
        - url
        - createdAt
    StripeConnectWebhookAck:
      type: object
      properties:
        received:
          type: boolean
          enum:
            - true
      required:
        - received
    StripeConnectWebhookError:
      type: object
      properties:
        error:
          type: string
        reason:
          type: string
      required:
        - error
  parameters: {}
paths:
  /v1/healthz:
    get:
      tags:
        - health
      summary: Liveness probe
      description: Returns 200 as long as the isolate is up.
      responses:
        "200":
          description: Service is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /v1/readyz:
    get:
      tags:
        - health
      summary: Readiness probe
      description: Checks Postgres reachability over the Supavisor pooler. 503 +
        status=degraded when unreachable. (Supabase Auth + Storage + Realtime
        share this Postgres, so one check covers the data plane — ADR-0010.)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Degraded — Postgres unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/auth/role-claim:
    post:
      tags:
        - auth
      summary: Set the permanent role on the authenticated Supabase user
      description: Idempotent. Rejects with 409 if the user already has a role claim
        that differs from the request — role is permanent (ADR-0011 / CONTEXT §
        Authentication). `role` is one of {parent, caregiver, provider} (admin
        is internal-only, never self-assignable). A caregiver must include
        `categories`; a provider must include `specialty`. Supply roles
        (caregiver/provider) must include a resident `state` (drives per-state
        adapter routing, ADR-0009/0015); parent must not. Claims are written to
        Supabase `app_metadata`, and the supply identity (role,
        categories/specialty, state) is persisted to the `providers` table. The
        client must refresh its session to receive an access token carrying the
        new claims.
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - parent
                    - caregiver
                    - provider
                categories:
                  type: array
                  items:
                    type: string
                    enum:
                      - babysitter
                      - tutor
                      - nanny
                  minItems: 1
                specialty:
                  type: string
                  enum:
                    - slp
                    - ot
                    - aba
                    - psychology
                    - other
                state:
                  type: string
                  enum:
                    - AL
                    - AK
                    - AZ
                    - AR
                    - CA
                    - CO
                    - CT
                    - DE
                    - DC
                    - FL
                    - GA
                    - HI
                    - ID
                    - IL
                    - IN
                    - IA
                    - KS
                    - KY
                    - LA
                    - ME
                    - MD
                    - MA
                    - MI
                    - MN
                    - MS
                    - MO
                    - MT
                    - NE
                    - NV
                    - NH
                    - NJ
                    - NM
                    - NY
                    - NC
                    - ND
                    - OH
                    - OK
                    - OR
                    - PA
                    - RI
                    - SC
                    - SD
                    - TN
                    - TX
                    - UT
                    - VT
                    - VA
                    - WA
                    - WV
                    - WI
                    - WY
              required:
                - role
      responses:
        "200":
          description: Role claim set (or already matching)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleClaimResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "409":
          description: Role already claimed (permanent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/issue:
    post:
      tags:
        - auth
      summary: Issue an email-OTP for the authenticated user
      description: Email-OTP fallback per CONTEXT § MFA posture — used for pre-paywall
        Parents without a phone on file. The notifier is a dev stub today;
        Resend wiring lands in OH-194.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailOtpIssueResponse"
        "400":
          description: No email on account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/email-otp/verify:
    post:
      tags:
        - auth
      summary: Verify an email-OTP and open a step-up window
      security:
        - supabaseAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
      responses:
        "200":
          description: OTP verified — step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: OTP rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/auth/step-up/refresh:
    post:
      tags:
        - auth
      summary: Record a fresh MFA challenge from a Supabase aal2 access token
      description: Called by clients after completing a Supabase MFA challenge (TOTP /
        phone factor). Reads the token's `aal` + `amr` claims and opens a
        15-minute step-up window in `auth_step_up_grants`. Rejects when the
        access token is not `aal2`.
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Step-up window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepUpRefreshResponse"
        "400":
          description: Access token is not aal2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
  /v1/caregiver/connect/summary:
    get:
      tags:
        - caregiver
      summary: Read the authenticated Caregiver's Stripe Connect Express account summary
      description: "Returns the read-only Connect account state mirrored from
        `account.updated` webhooks: charges_enabled / payouts_enabled /
        details_submitted, the disabled_reason if Stripe paused the account, and
        the requirement lists (currently_due, past_due, pending_verification).
        `accountReady` is true iff both capabilities are enabled — the gate on
        verification activation + appearing in search (OH-190)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Connect account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectSummary"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/onboarding-link:
    post:
      tags:
        - caregiver
      summary: Create / reuse a Stripe Connect Express account and return a hosted
        onboarding URL
      description: "Idempotent: if the Caregiver already has a
        `provider_connect_accounts` row with a `stripe_account_id`, reuses it;
        otherwise creates a fresh Express account (type=express, country=US,
        capabilities=card_payments+transfers, business_type=individual) and
        stamps it onto the row. Returns a freshly-issued Stripe-hosted
        account-onboarding link (the KYC flow — PRD story 49). Precondition:
        Checkr screening has cleared (`screening_passed_at`)."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Onboarding link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectOnboardingLink"
        "400":
          description: Screening not cleared / no email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role (Providers have no Connect)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "409":
          description: Verification terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/caregiver/connect/dashboard-link:
    post:
      tags:
        - caregiver
      summary: Issue a Stripe Express dashboard login link — requires step-up MFA
        (bank/withdrawal gate)
      description: "Returns a one-time Stripe Express dashboard login URL. Bank-detail
        edits and payout withdrawals both happen inside the Express dashboard,
        so this single MFA-gated endpoint satisfies OH-190 AC #3 (step-up MFA
        enforced on bank/withdrawal — PRD story 57). Requires a step-up MFA
        grant issued within the last 5 minutes (`POST
        /v1/auth/step-up/refresh`); without it the auth middleware returns 403
        `step_up_required`."
      security:
        - supabaseAccessToken: []
      responses:
        "200":
          description: Dashboard login link issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectDashboardLink"
        "400":
          description: Connect account missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "403":
          description: Wrong role or step-up required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
        "404":
          description: Caregiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverConnectError"
  /v1/webhooks/stripe-connect:
    post:
      tags:
        - webhooks
      summary: Stripe Connect Express webhook — mirrors account.updated onto
        provider_connect_accounts
      description: Receives Stripe Connect webhook deliveries (separate endpoint +
        signing secret from the screening webhook). Verifies the
        `Stripe-Signature` header with STRIPE_CONNECT_WEBHOOK_SECRET, then on
        `account.updated` mirrors charges_enabled / payouts_enabled /
        details_submitted / requirements / disabled_reason onto the row keyed by
        `stripe_account_id`. When both capabilities transition to enabled for
        the first time, stamps `account_ready_at`. Public route — the Stripe
        signature is the authentication.
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookAck"
        "400":
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectWebhookError"
