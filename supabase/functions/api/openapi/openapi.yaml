            - released
            - refunded
            - clawback
            - dismissed
      required:
        - id
        - status
        - resolution
    AdminDisputeResolveRequest:
      type: object
      properties:
        resolution:
          type: string
          enum:
            - released
            - refunded
            - clawback
            - dismissed
        note:
          type: string
          maxLength: 1000
      required:
